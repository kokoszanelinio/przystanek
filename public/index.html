<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>CKAN DataStore - Tablica</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #ddd; padding: 8px; }
    th { background: #f2f2f2; }
  </style>
</head>
<body>
  <h2>Tablica odjazdów (CKAN DataStore)</h2>
  <table>
    <thead>
      <tr>
        <th>Linia</th>
        <th>Kierunek</th>
        <th>Odjazd</th>
      </tr>
    </thead>
    <tbody id="timetable">
      <tr><td colspan="3">Ładowanie...</td></tr>
    </tbody>
  </table>

  <script>
    async function loadArrivals() {
      try {
        const resp = await fetch("/api/arrivals");
        const data = await resp.json();

        const tbl = document.getElementById("timetable");
        tbl.innerHTML = "";

        if (!Array.isArray(data) || !data.length) {
          tbl.innerHTML = "<tr><td colspan='3'>Brak danych</td></tr>";
          return;
        }

        data.forEach(item => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${item.linia}</td>
            <td>${item.kierunek}</td>
            <td>${item.odjazd}</td>
          `;
          tbl.appendChild(tr);
        });
      } catch (err) {
        console.error("Błąd:", err);
        document.getElementById("timetable").innerHTML = "<tr><td colspan='3'>Błąd ładowania</td></tr>";
      }
    }

    loadArrivals();
    setInterval(loadArrivals, 30000); // odśwież co 30s
  </script>
</body>
</html>
