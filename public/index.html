<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Tablica MPK – linie 3, 5 i 114</title>
  <style>
    body {
      margin: 0; padding: 0;
      font-family: Arial, sans-serif;
      background: #f0f0f0;
    }
    .top-bar {
      background: #444;
      color: #fff;
      padding: 10px;
      font-size: 20px;
    }
    .table-container {
      background: #fff;
      margin: 20px;
      border-radius: 4px;
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }
    th {
      background: #eee;
    }
    .line-badge {
      display: inline-block;
      background: #333;
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="top-bar">Tablica MPK (3, 5 i 114)</div>

<div class="table-container">
  <table id="mainTable">
    <thead>
      <tr>
        <th>Linia</th>
        <th>Kierunek</th>
        <th>Odjazd</th>
      </tr>
    </thead>
    <tbody>
      <!-- wypełniamy dynamicznie -->
    </tbody>
  </table>
</div>

<script>
// Koordynaty przystanku Krakowska
const STOP_LAT = 51.0930579;
const STOP_LON = 17.0605519;
const AVERAGE_SPEED_KMH = 18;
const REFRESH_INTERVAL = 30000;

// 1. Pobieramy z /api/all
async function fetchAll() {
  try {
    const resp = await fetch("/api/all");
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const data = await resp.json();
    // data: [{name:"3", type:"tram", x:51..., y:17...}, {name:"5",...}, {name:"114",...}]

    // Policz czas dojazdu
    data.forEach(item => {
      item.timeMin = computeTimeMin(item.x, item.y);
      // Kierunku brak w JSON, więc dajemy "?" albo coś
      item.direction = "Brak info";
    });

    // Sortujemy rosnąco po timeMin
    data.sort((a,b) => a.timeMin - b.timeMin);

    fillTable(data);
  } catch (err) {
    console.error("Błąd:", err);
  }
}

function computeTimeMin(lat, lon) {
  if (!lat || !lon) return 999;
  const dist = haversine(lat, lon, STOP_LAT, STOP_LON);
  return Math.round( (dist / AVERAGE_SPEED_KMH) * 60 );
}

// Wzór haversine
function haversine(lat1, lon1, lat2, lon2) {
  const R=6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
            Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// 2. Wypełniamy tabelę
function fillTable(items) {
  const tbody = document.querySelector("#mainTable tbody");
  tbody.innerHTML = "";

  if (!items.length) {
    const tr = document.createElement("tr");
    const td = document.createElement("td");
    td.colSpan = 3;
    td.innerText = "Brak danych";
    tr.appendChild(td);
    tbody.appendChild(tr);
    return;
  }

  items.forEach(item => {
    const tr = document.createElement("tr");

    // Linia
    const tdLine = document.createElement("td");
    const badge = document.createElement("span");
    badge.className = "line-badge";
    badge.innerText = "L" + item.name; 
    tdLine.appendChild(badge);
    tr.appendChild(tdLine);

    // Kierunek
    const tdDir = document.createElement("td");
    tdDir.innerText = item.direction; // brak w JSON, dajemy cokolwiek
    tr.appendChild(tdDir);

    // Odjazd
    const tdTime = document.createElement("td");
    tdTime.innerText = item.timeMin + " min";
    tr.appendChild(tdTime);

    tbody.appendChild(tr);
  });
}

// Start
fetchAll();
setInterval(fetchAll, REFRESH_INTERVAL);
</script>

</body>
</html>
