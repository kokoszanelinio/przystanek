<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablica MPK (3, 5 i 114)</title>
    <style>
        body { font-family: Arial, sans-serif; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border: 1px solid black; text-align: center; }
        th { background: #f1f1f1; }
        .bus { background: black; color: white; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>Tablica MPK (3, 5 i 114)</h2>
    <table>
        <thead>
            <tr>
                <th>Linia</th>
                <th>Kierunek</th>
                <th>Odjazd</th>
            </tr>
        </thead>
        <tbody id="data">
            <tr><td colspan="3">Ładowanie danych...</td></tr>
        </tbody>
    </table>

    <script>
        async function fetchData() {
            try {
                const response = await fetch('/api/trams');
                const data = await response.json();

                const table = document.getElementById('data');
                table.innerHTML = '';

                data.forEach(tram => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><span class="bus">L${tram.name}</span></td>
                        <td>${tram.type === "tram" ? "Tramwaj" : "Autobus"}</td>
                        <td>${tram.odjazd} min</td>
                    `;
                    table.appendChild(row);
                });
            } catch (error) {
                console.error("Błąd pobierania danych:", error);
            }
        }

        fetchData();
        setInterval(fetchData, 15000);
    </script>
</body>
</html>
