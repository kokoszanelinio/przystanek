<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Tablica MPK – linie 3, 5 i 114</title>
  <style>
    body {
      margin: 0; padding: 0;
      font-family: Arial, sans-serif;
      background: #f0f0f0;
    }
    .top-bar {
      background: #444;
      color: #fff;
      padding: 10px;
      font-size: 20px;
    }
    .table-container {
      background: #fff;
      margin: 20px;
      border-radius: 4px;
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }
    th {
      background: #eee;
    }
    .line-badge {
      display: inline-block;
      background: #333;
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="top-bar">Tablica MPK – linie 3, 5 (przystanek 25002) i 114 (przystanek 25102)</div>

<div class="table-container">
  <table id="mainTable">
    <thead>
      <tr>
        <th>Linia</th>
        <th>Kierunek</th>
        <th>Odjazd</th>
      </tr>
    </thead>
    <tbody>
      <!-- Wypełniamy dynamicznie -->
    </tbody>
  </table>
</div>

<script>
// Założone współrzędne przystanków (przykładowe, do zastąpienia rzeczywistymi danymi)
const STOPS = {
  "3": { lat: 51.093, lon: 17.061 }, // Przystanek 25002 dla tramwajów 3 i 5
  "5": { lat: 51.093, lon: 17.061 },
  "114": { lat: 51.094, lon: 17.062 } // Przystanek 25102 dla autobusu 114
};
const AVERAGE_SPEED_KMH = 18; // Średnia prędkość w km/h
const REFRESH_INTERVAL = 30000; // Odświeżanie co 30 sekund

// Pobieramy dane z /api/all
async function fetchAll() {
  try {
    const resp = await fetch("/api/all");
    if (!resp.ok) throw new Error("HTTP " + resp.status);
    const data = await resp.json();
    // data: [{name: "3", type: "tram", x: 51..., y: 17...}, {name: "5", ...}, {name: "114", ...}]

    // Obliczamy czas dojazdu do odpowiedniego przystanku
    data.forEach(item => {
      const stop = STOPS[item.name];
      if (stop) {
        item.timeMin = computeTimeMin(item.x, item.y, stop.lat, stop.lon);
      } else {
        item.timeMin = 999; // Domyślna wartość, jeśli linia nieznana
      }
      item.direction = "Brak info"; // API nie dostarcza kierunku
    });

    // Filtrujemy pojazdy zbyt daleko (np. > 30 minut)
    const filteredData = data.filter(item => item.timeMin < 30);

    // Sortujemy rosnąco po czasie dojazdu
    filteredData.sort((a, b) => a.timeMin - b.timeMin);

    fillTable(filteredData);
  } catch (err) {
    console.error("Błąd:", err);
  }
}

// Obliczamy czas dojazdu w minutach
function computeTimeMin(lat, lon, stopLat, stopLon) {
  if (!lat || !lon) return 999;
  const dist = haversine(lat, lon, stopLat, stopLon);
  return Math.round((dist / AVERAGE_SPEED_KMH) * 60);
}

// Wzór Haversine do obliczania odległości
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371; // Promień Ziemi w km
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// Wypełniamy tabelę
function fillTable(items) {
  const tbody = document.querySelector("#mainTable tbody");
  tbody.innerHTML = "";

  if (!items.length) {
    const tr = document.createElement("tr");
    const td = document.createElement("td");
    td.colSpan = 3;
    td.innerText = "Brak danych";
    tr.appendChild(td);
    tbody.appendChild(tr);
    return;
  }

  items.forEach(item => {
    const tr = document.createElement("tr");

    // Linia
    const tdLine = document.createElement("td");
    const badge = document.createElement("span");
    badge.className = "line-badge";
    badge.innerText = item.name; // Tylko numer linii, bez "L"
    tdLine.appendChild(badge);
    tr.appendChild(tdLine);

    // Kierunek
    const tdDir = document.createElement("td");
    tdDir.innerText = item.direction;
    tr.appendChild(tdDir);

    // Odjazd
    const tdTime = document.createElement("td");
    tdTime.innerText = item.timeMin + " min";
    tr.appendChild(tdTime);

    tbody.appendChild(tr);
  });
}

// Start i odświeżanie
fetchAll();
setInterval(fetchAll, REFRESH_INTERVAL);
</script>

</body>
</html>
