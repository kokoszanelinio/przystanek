<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Tablica Tramwajów (linie 3 i 5) - GitHub Pages</title>
  <style>
    body {
      margin: 0; padding: 0;
      font-family: Arial, sans-serif;
      background: #eae6d5; /* lekko beżowe tło */
    }
    .top-bar {
      background: #444;
      color: #fff;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .top-bar h1 {
      margin: 0;
      font-size: 20px;
    }
    .last-updated {
      font-size: 14px;
    }
    .content {
      padding: 15px;
    }
    .columns {
      display: flex;
      gap: 20px;
    }
    .column {
      flex: 1;
      background: #f6f5eb;
      border-radius: 5px;
      padding: 10px;
    }
    .column h2 {
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 18px;
      background: #ddd;
      padding: 5px;
    }
    .departure-row {
      display: flex;
      justify-content: space-between;
      padding: 6px;
      border-bottom: 1px solid #ccc;
      align-items: center;
    }
    .departure-row:last-child {
      border-bottom: none;
    }
    .line-badge {
      background: #333;
      color: #fff;
      border-radius: 4px;
      padding: 4px 8px;
      margin-right: 10px;
      font-weight: bold;
    }
    .destination {
      flex: 1;
    }
    .time {
      font-weight: bold;
      min-width: 50px;
      text-align: right;
    }
    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <h1>Tramwaje z Krakowska (linie 3 i 5)</h1>
    <div id="lastUpdated" class="last-updated">Ostatnia aktualizacja: --:--</div>
  </div>

  <div class="content">
    <div class="columns">
      <!-- Kolumna dla linii 3 -->
      <div class="column">
        <h2>Linia 3</h2>
        <div id="line3List"></div>
      </div>
      <!-- Kolumna dla linii 5 -->
      <div class="column">
        <h2>Linia 5</h2>
        <div id="line5List"></div>
      </div>
    </div>
    <div id="errorMsg" class="error"></div>
  </div>

<script>
/*
  -------------------------------
  1. KONFIGURACJA
  -------------------------------
*/
// Oryginalny CSV z Wrocław Open Data (bezpośredni link):
const CSV_URL = "https://www.wroclaw.pl/open-data/datastore/dump/17308285-3977-42f7-81b7-fdd168c210a2";

// Korzystamy z proxy AllOrigins:
const PROXY_URL = "https://api.allorigins.win/get?url=" + encodeURIComponent(CSV_URL);

// Koordynaty przystanku KRAKOWSKA
const STOP_LAT = 51.0930579;
const STOP_LON = 17.0605519;

// Założona średnia prędkość tramwaju (km/h)
const AVERAGE_SPEED_KMH = 18; // ~ 5 m/s

// Częstotliwość odświeżania (ms)
const REFRESH_INTERVAL = 5000; // 5 sekund

/*
  -------------------------------
  2. POBIERANIE CSV PRZEZ PROXY
  -------------------------------
  AllOrigins zwraca JSON w formacie:
  {
    "contents": "TU JEST ZAWARTOŚĆ CSV",
    "status": { ... }
  }
  Więc musimy zrobić fetch(PROXY_URL), odczytać .json(), 
  a potem z .contents wziąć surowy CSV.
*/
async function fetchCSVviaProxy() {
  const response = await fetch(PROXY_URL);
  if (!response.ok) {
    throw new Error(`HTTP error! status: ${response.status}`);
  }
  const data = await response.json();
  // data.contents to surowy tekst CSV
  return data.contents;
}

/*
  -------------------------------
  3. parseCSV
  -------------------------------
  Zamiana surowego tekstu CSV na tablicę obiektów
*/
function parseCSV(csvText) {
  const lines = csvText.split(/\r?\n/).filter(line => line.trim().length > 0);
  if (lines.length < 2) return [];

  const headers = lines[0].split(',');
  const results = [];

  for (let i = 1; i < lines.length; i++) {
    const row = lines[i].split(',');
    const obj = {};
    headers.forEach((h, idx) => {
      const headerClean = h.replace(/"/g, '').trim();
      const value = (row[idx] || '').replace(/"/g, '').trim();
      obj[headerClean] = value;
    });
    results.push(obj);
  }
  return results;
}

/*
  -------------------------------
  4. computeDistanceKm (Haversine)
  -------------------------------
*/
function computeDistanceKm(lat1, lon1, lat2, lon2) {
  const R = 6371; // km
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = 
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

/*
  -------------------------------
  5. updateTable
  -------------------------------
  - pobiera CSV via Proxy
  - parsuje
  - filtruje linie 3 i 5
  - liczy czas dojazdu (bardzo orientacyjny)
  - wyświetla w 2 kolumnach
*/
async function updateTable() {
  try {
    const csvText = await fetchCSVviaProxy();
    const rows = parseCSV(csvText);

    // Upewnij się, że w CSV są kolumny "Nazwa_Linii", "Lat", "Lon" (lub podobne).
    const filtered3 = [];
    const filtered5 = [];

    rows.forEach(r => {
      const linia = r["Nazwa_Linii"]; 
      const latStr = r["Lat"];
      const lonStr = r["Lon"];

      if (!linia || !latStr || !lonStr) return; // pomijamy

      const lat = parseFloat(latStr);
      const lon = parseFloat(lonStr);
      if (isNaN(lat) || isNaN(lon)) return;

      const distKm = computeDistanceKm(lat, lon, STOP_LAT, STOP_LON);
      const timeMin = Math.round( (distKm / AVERAGE_SPEED_KMH) * 60 );

      const item = {
        linia: linia,
        timeMin: timeMin
      };

      if (linia === "3") filtered3.push(item);
      else if (linia === "5") filtered5.push(item);
    });

    // Sortujemy po czasie rosnąco
    filtered3.sort((a,b) => a.timeMin - b.timeMin);
    filtered5.sort((a,b) => a.timeMin - b.timeMin);

    fillColumn("line3List", filtered3);
    fillColumn("line5List", filtered5);

    // Ustawiamy czas ostatniej aktualizacji
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    document.getElementById("lastUpdated").textContent = `Ostatnia aktualizacja: ${hh}:${mm}`;

    document.getElementById("errorMsg").textContent = "";
  } catch (err) {
    console.error(err);
    document.getElementById("errorMsg").textContent = "Błąd: " + err.message;
  }
}

/*
  -------------------------------
  6. fillColumn
  -------------------------------
  Wypełnia #line3List lub #line5List 
  listą elementów w formacie:
    L3 | Kierunek? | X min
  (Brak prawdziwego kierunku w CSV, 
   więc pokazujemy "Kierunek?")
*/
function fillColumn(containerId, items) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";

  if (!items || items.length === 0) {
    container.innerHTML = "<p>Brak danych</p>";
    return;
  }

  items.forEach(item => {
    const rowDiv = document.createElement("div");
    rowDiv.className = "departure-row";

    const badgeSpan = document.createElement("span");
    badgeSpan.className = "line-badge";
    badgeSpan.textContent = "L" + item.linia;

    const destSpan = document.createElement("span");
    destSpan.className = "destination";
    destSpan.textContent = "Kierunek?"; // brak w CSV

    const timeSpan = document.createElement("span");
    timeSpan.className = "time";
    timeSpan.textContent = item.timeMin + " min";

    rowDiv.appendChild(badgeSpan);
    rowDiv.appendChild(destSpan);
    rowDiv.appendChild(timeSpan);

    container.appendChild(rowDiv);
  });
}

/*
  -------------------------------
  7. Start
  -------------------------------
  Uruchamiamy update co 5s
*/
window.addEventListener("DOMContentLoaded", () => {
  updateTable();
  setInterval(updateTable, REFRESH_INTERVAL);
});
</script>
</body>
</html>
